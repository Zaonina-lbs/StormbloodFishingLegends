# ========== 鱼基础数据 ==========
# 从 fish_data.xlsx 导入，可在配置中调整参数
# bait 为空字符串表示任何鱼饵都能上钩
# 完整数据在 fish_data.yaml 中，此处列出可通过热更新的可配项
fishes:
  - name: 公主青鳉
    region: 白银乡
    fishing_ground: 白银水路
    bait: 肥蚯蚓
    weather: ""
    fish_type: 鱼王
    min_size: 4.8
    min_big_size: 11.4
    max_size: 12.1
    base_value: 1500
  - name: 盆栽鱼
    region: 白银乡
    fishing_ground: 白银水路
    bait: 肥蚯蚓
    weather: ""
    fish_type: 普通鱼
    min_size: 3.9
    min_big_size: 9.2
    max_size: 9.7
    base_value: 41
# 完整鱼数据由 data_loader.py 从 fish_data.xlsx 加载