# FF14 钓鱼游戏配置文件
# 所有数值类参数均通过此配置文件读取，不硬编码
# 百分比采用 0~100 整数表示

# ========== Debug 模式 ==========
debug: true

# ========== 基础参数 ==========

# 初始金币
initial_gold: 2000

# 签到金币范围
sign_gold_min: 1000
sign_gold_max: 2000

# 鱼饵概率（百分比 0~100）
bait_prob_target: 25      # 目标鱼概率
bait_prob_king: 2         # 鱼王概率
bait_prob_emperor: 0.2    # 鱼皇概率

# 尺寸分布概率（百分比 0~100）
size_prob_normal: 75      # 普通尺寸概率
size_prob_big: 25         # 大鱼尺寸概率

# 价值浮动范围（百分比 0~100）
value_float_percent: 20   # ±20%

# 氪金上限
krypton_max: 1000

# 分页大小
page_size: 10

# 排行榜显示条数
leaderboard_size: 10

# 版本固定字符串
version_string: "FF14 4.0-4.X"

# 数据库存储路径
db_path: "fishing_game.db"

# 天气类型列表
weather_types:
  - 晴朗
  - 碧空
  - 阴云
  - 薄雾
  - 微风
  - 强风
  - 小雨
  - 暴雨
  - 打雷
  - 雷雨
  - 扬沙

